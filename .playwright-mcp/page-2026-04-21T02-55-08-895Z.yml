    - generic [ref=e141]:
      - paragraph [ref=e142]: What the first call feels like
      - heading "From people who booked one." [level=2] [ref=e143]
      - generic [ref=e144]:
        - figure "Patricia M. · Salem, NH" [ref=e145]:
          - blockquote [ref=e146]: “Karyn walked us through selling our home of 38 years with such patience. My husband and I were overwhelmed at first. She sat at our kitchen table, explained every step, and never once pressured us. We closed above asking and we are in our condo at Tuscan Village now.”
          - generic [ref=e147]: Patricia M. · Salem, NH
        - figure "Joanne T. · Derry, NH" [ref=e148]:
          - blockquote [ref=e149]: “I had already signed with another agent before a neighbor told me about Karyn. I wish I had called her first. When my contract ended she came over, walked the property, and had a real market analysis for me the next day. No fluff. Just numbers and a plan.”
          - generic [ref=e150]: Joanne T. · Derry, NH
        - figure "Maureen F. · Windham, NH" [ref=e151]:
          - blockquote [ref=e152]: “Selling the house where we raised three kids was harder than we thought it would be. Karyn was kind about it. She did not rush us. When we were ready, she listed it on a Thursday and we had two offers by Sunday night.”
          - generic [ref=e153]: Maureen F. · Windham, NH
        - figure "Tom and Sarah B. · Atkinson, NH (from Andover, MA)" [ref=e154]:
          - blockquote [ref=e155]: “Moving the whole family up from Andover. Karyn met us at four different houses across three towns over one weekend. She was patient, honest about which ones had issues, and she never once pushed us toward the more expensive option.”
          - generic [ref=e156]: Tom and Sarah B. · Atkinson, NH (from Andover, MA)
    - generic [ref=e158]:
      - paragraph [ref=e159]: Quick questions
      - heading "Before you book." [level=2] [ref=e160]
      - generic [ref=e161]:
        - generic [ref=e162]:
          - term [ref=e163]: How long is the call, really?
          - definition [ref=e164]: Fifteen minutes, sometimes twenty. If we need longer and you want to keep going, we keep going. If fifteen is all you have, fifteen is enough to get the lay of the land.
        - generic [ref=e165]:
          - term [ref=e166]: Is there any cost?
          - definition [ref=e167]: No. Not for the call, not for a follow-up, not for a conversation before you are ready to list or buy. The commission is earned at closing, not at hello.
        - generic [ref=e168]:
          - term [ref=e169]: What if I am not ready to sell or buy for a while?
          - definition [ref=e170]: That is completely fine. Many of the best sellers I have worked with called me a year before they listed. Early conversations are useful. I will not push you to act before you are ready.
        - generic [ref=e171]:
          - term [ref=e172]: Do I need to prepare anything?
          - definition [ref=e173]: Not really. If you are selling, know roughly what you paid and when, and any major updates you have done. If you are buying, know your rough budget and which towns are on your list. That is it.
        - generic [ref=e174]:
          - term [ref=e175]: What happens right after I book?
          - definition [ref=e176]: You get a calendar invite with the call details and my direct number. You can reschedule up to an hour before if life gets in the way.
