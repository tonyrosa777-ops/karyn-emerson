    - generic [ref=e221]:
      - paragraph [ref=e223]: AFTER YOU CLOSE
      - heading "DMV, registration, inspection, taxes." [level=2] [ref=e225]
      - list [ref=e226]:
        - listitem [ref=e228]:
          - generic [ref=e229]: "01"
          - generic [ref=e230]:
            - paragraph [ref=e231]: Establish NH residency.
            - paragraph [ref=e232]: Your new deed and utility bills do most of the work here. The date you close is usually the date residency begins.
        - listitem [ref=e234]:
          - generic [ref=e235]: "02"
          - generic [ref=e236]:
            - paragraph [ref=e237]: Get your NH driver's license within 60 days.
            - paragraph [ref=e238]: Visit a NH DMV office with proof of residency, your MA license, and a second form of ID. Walk-in and appointment options at Concord, Manchester, Derry, and Salem locations.
        - listitem [ref=e240]:
          - generic [ref=e241]: "03"
          - generic [ref=e242]:
            - paragraph [ref=e243]: Register vehicles within 60 days of establishing residency.
            - paragraph [ref=e244]: "Two-step in NH: town clerk first for the municipal portion, then DMV for plates and title. Bring your title or lienholder information, proof of residency, and odometer reading."
        - listitem [ref=e246]:
          - generic [ref=e247]: "04"
          - generic [ref=e248]:
            - paragraph [ref=e249]: Pass the NH annual state inspection.
            - paragraph [ref=e250]: Every NH-registered vehicle needs an annual safety inspection. Most local shops do it in 30 minutes. Inspection sticker shows the expiration month.
        - listitem [ref=e252]:
          - generic [ref=e253]: "05"
          - generic [ref=e254]:
            - paragraph [ref=e255]: Surrender your MA plates and cancel MA registration.
            - paragraph [ref=e256]: File the cancellation with the MA RMV so you are not billed for the next MA excise tax cycle. Keep the receipt.
        - listitem [ref=e258]:
          - generic [ref=e259]: "06"
          - generic [ref=e260]:
            - paragraph [ref=e261]: Update voter registration.
            - paragraph [ref=e262]: NH registers voters through the town clerk. Bring proof of residency. Same-day voter registration is available in NH.
        - listitem [ref=e264]:
          - generic [ref=e265]: "07"
          - generic [ref=e266]:
            - paragraph [ref=e267]: Watch the commuter-tax trap.
            - paragraph [ref=e268]: "If you still work in MA, MA income tax still applies to those wages. NH does not credit it back. Plan your withholdings accordingly. (Source: milestonefinancialplanning.com, referenced in market-intelligence.md §6.)"
        - listitem [ref=e270]:
          - generic [ref=e271]: "08"
          - generic [ref=e272]:
            - paragraph [ref=e273]: Set up property tax escrow.
            - paragraph [ref=e274]: NH property tax is billed twice a year, typically July and December. Your lender's escrow should smooth this into monthly. Always confirm the first year is estimated, and watch for a balloon bill in the second year.
        - listitem [ref=e276]:
          - generic [ref=e277]: "09"
          - generic [ref=e278]:
            - paragraph [ref=e279]: Update your homeowners insurance.
            - paragraph [ref=e280]: NH underwriting differs from MA on flood, wind, and well coverage. Send the new policy to your lender before closing.
        - listitem [ref=e282]:
          - generic [ref=e283]: "10"
          - generic [ref=e284]:
            - paragraph [ref=e285]: File your final MA resident return next April.
            - paragraph [ref=e286]: The year you move, MA treats you as a part-year resident. NH has no state return to file. Your tax preparer handles the switch; bring both addresses and the move date.
