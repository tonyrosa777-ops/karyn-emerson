    - generic [ref=e38]:
      - paragraph [ref=e39]: TL;DR · THE 30-SECOND ANSWER
      - heading "Is it worth moving from Massachusetts to New Hampshire for the taxes?" [level=2] [ref=e40]
      - paragraph [ref=e42]: Moving from Massachusetts to New Hampshire typically saves a $200,000 household around $10,000 per year on state income tax (MA charges a flat 5 percent, NH charges zero on wages), minus roughly $3,000 to $5,000 per year in higher NH property tax on a comparable Southern NH home, netting about $5,000 to $7,000 in year one. Salem, Windham, and Derry are the three most popular MA to NH destinations. The honest math, plus the commuter tax trap that catches Boston commuters, is below.
