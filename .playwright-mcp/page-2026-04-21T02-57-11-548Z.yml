    - generic [ref=e78]:
      - paragraph [ref=e80]: THE 30-SECOND ANSWER
      - heading "Why families move up I-93 every spring." [level=2] [ref=e82]
      - generic [ref=e83]:
        - paragraph [ref=e84]: Massachusetts charges a flat 5% state income tax on wages and a 6.25% sales tax on most goods. New Hampshire charges neither. A typical dual-income household making $180,000 to $220,000 keeps roughly $9,000 to $11,000 more per year just by crossing the state line, before property tax even enters the conversation. [DEMO COPY - estimates].
        - paragraph [ref=e85]: "The catch: if you still work in MA, MA income tax still applies to the wages you earn there. That is the commuter-tax trap. And NH property taxes run higher per dollar of home value than MA averages in many towns, so the net savings depend on town selection. The calculator below runs the math for you. Play with it."
