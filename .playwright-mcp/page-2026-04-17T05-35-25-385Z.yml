        - heading "A neighbor's read on Salem." [level=2] [ref=e36]
        - generic [ref=e37]:
          - paragraph [ref=e38]: Salem is where Southern NH meets the Massachusetts line. Tuscan Village has changed the shape of the town in five short years, and the original North Salem and South Salem pockets still trade like the small-town New England they always were.
          - paragraph [ref=e39]: If you are weighing Salem against Windham or Methuen, the tax math and the commute almost always tell you which way to go.
          - paragraph [ref=e40]: The best way to really feel out a town is a fifteen-minute call. Tell me what you are trying to do. I will tell you honestly whether Salem is the right fit or whether one of the other six towns in the service area gets you closer to the life you are trying to build.
