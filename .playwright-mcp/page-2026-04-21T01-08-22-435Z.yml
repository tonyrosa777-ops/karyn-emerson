            - paragraph [ref=e70]: About Karyn
            - heading "A lifetime in Southern NH, and a practice built around the conversation, not the transaction." [level=2] [ref=e71]
            - generic [ref=e72]:
              - paragraph [ref=e73]: I grew up in this area. I know which side of Cobbett’s Pond holds its value through a down cycle, which Salem High feeder streets are quietly rezoning this year, and what it feels like to sit at a Windham kitchen table with a family that has lived there for forty years and is finally ready to talk about what comes next.
              - paragraph [ref=e74]: My practice is built on that kind of conversation. No scripts, no form letters, no pressure. You call, we meet, we walk the house or the neighborhood, and we go from there. If the timing is next month, great. If the timing is next year, that is fine too. Either way, you deserve an agent who starts with your situation, not a listing appointment.
            - link "Read Karyn’s Story" [ref=e76] [cursor=pointer]:
