      - region "Four reasons people call me before they call anyone else." [ref=e43]:
        - generic [ref=e44]:
          - generic [ref=e45]:
            - paragraph [ref=e46]: Where most visitors start
            - heading "Four reasons people call me before they call anyone else." [level=2] [ref=e47]
            - paragraph [ref=e48]: If any of these sound like the last twelve months of your life, you are already in the right place. Read them, pick the one that fits, and we will go from there.
          - generic [ref=e49]:
            - article [ref=e50]:
              - generic [ref=e51]: 🏡
              - heading "You want an agent who actually knows your street." [level=3] [ref=e52]
              - paragraph [ref=e53]: You have lived in Salem or Windham or Pelham for thirty years. You know which side of Cobbett's Pond holds its value, and you do not want to explain the Salem High feeder lines to a realtor who had to Google them. Your neighborhood deserves someone who has watched it change.
            - article [ref=e54]:
              - generic [ref=e55]: 🤝
              - heading "You are worried about being pushed into a lowball price." [level=3] [ref=e56]
              - paragraph [ref=e57]: You have heard the stories. An agent walks in, quotes a number twenty grand below what the house is worth, and pressures you to sign by the end of the week. That is not how this goes with me. We price it right together, on your timing, and I show you the comps.
            - article [ref=e58]:
              - generic [ref=e59]: 📍
              - heading "You are coming up from MA and do not know which town is right." [level=3] [ref=e60]
              - paragraph [ref=e61]: Is Derry the good one or the other one? Is Windham worth the premium over Londonderry? What does Salem actually feel like after you leave the mall? I grew up here. I will tell you honestly which town fits your family, your commute, and your budget, before you ever open Zillow.
            - article [ref=e62]:
              - generic [ref=e63]: 📱
              - heading "You are afraid of being ghosted after the listing goes up." [level=3] [ref=e64]
              - paragraph [ref=e65]: You sign the paperwork, the sign goes in the yard, and suddenly your calls stop getting returned. I have heard that story too many times to let it be yours. I text back. Evenings, weekends, the stretch between the inspection and the close. That is the whole job.
      - region "A lifetime in Southern NH, and a practice built around the conversation, not the transaction." [ref=e66]:
        - generic [ref=e68]:
